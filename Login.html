<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Udyog Saarthi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .login-card { background: white; border-radius: 2rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-sky-600 rounded-xl text-white text-2xl mb-4">
                <i class="fas fa-briefcase"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-800 italic">Udyog Saarthi</h1>
            <p class="text-slate-500 text-sm font-medium">Unified Career Portal</p>
        </div>

        <div class="login-card p-10">
            <h2 class="text-xl font-bold text-slate-800 mb-6 text-center">Login to your Account</h2>

            <form onsubmit="processLogin(event)" class="space-y-5">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 block">Email Address</label>
                    <input type="email" id="email" required class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 outline-none focus:ring-2 focus:ring-sky-500/20 focus:border-sky-500 transition-all" placeholder="email@example.com">
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 block">Password</label>
                    <input type="password" id="password" required class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 outline-none focus:ring-2 focus:ring-sky-500/20 focus:border-sky-500 transition-all" placeholder="••••••••">
                </div>

                <button type="submit" class="w-full bg-sky-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-sky-700 transition-all">
                    Sign In
                </button>
            </form>
        </div>
    </div>

    <script>
        function processLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();

            // ADMIN REDIRECT LOGIC
            if (email === "admin.udyog@gmail.com" && pass === "admin@123") {
                alert("Welcome Admin!");
                window.location.href = "admin_dashboard.html"; // MUST match filename below
            } else {
                // USER REDIRECT LOGIC (To Registration if not admin)
                alert("Redirecting to Registration...");
                window.location.href = "registration.html";
            }
        }
    </script>
</body>
</html>
